name: Test NixOS-WSL Bootstrap

on:
  push:
    branches: ["fix/nixos-wsl-bootstrap"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bootstrap-wsl:
    name: WSL2 bootstrap end-to-end
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Check WSL availability
        shell: pwsh
        run: wsl --version

      - name: Set WSL default version to 2
        shell: pwsh
        run: wsl --set-default-version 2

      - name: Download latest NixOS-WSL
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }
          $release = Invoke-RestMethod "https://api.github.com/repos/nix-community/NixOS-WSL/releases/latest" -Headers $headers
          $asset = $release.assets | Where-Object { $_.name -eq "nixos-wsl.tar.gz" } | Select-Object -First 1
          if (-not $asset) {
            $asset = $release.assets | Where-Object { $_.name -like "*x86_64*.tar.gz" } | Select-Object -First 1
          }
          Write-Host "Downloading $($asset.name) from release $($release.tag_name)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$env:TEMP\nixos-wsl.tar.gz"

      - name: Import NixOS into WSL2
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "$env:USERPROFILE\NixOS" -Force
          wsl --import NixOS "$env:USERPROFILE\NixOS" "$env:TEMP\nixos-wsl.tar.gz" --version 2
          wsl --list --verbose

      - name: Enable Nix flakes
        shell: pwsh
        run: |
          wsl -d NixOS -u root -- bash -c "mkdir -p /root/.config/nix && echo 'extra-experimental-features = nix-command flakes' > /root/.config/nix/nix.conf"

      - name: Run nixos-rebuild switch (bootstrap config)
        shell: pwsh
        timeout-minutes: 75
        run: |
          wsl -d NixOS -u root -- bash -c "nixos-rebuild switch --flake 'github:victorwkb/dotfiles/${{ github.ref_name }}#nixos-bootstrap' --show-trace"

      - name: Restart WSL and verify login
        shell: pwsh
        run: |
          wsl --shutdown
          Start-Sleep -Seconds 10
          wsl -d NixOS -u nixos -- bash -c "whoami && echo 'Bootstrap OK'"
